name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      # workspace member (digestkit) + 全 extras (pdf/web/notion/slack/email) を
      # インストールしないと、import や型解決が通らないため `--all-packages
      # --all-extras` を付与。
      - run: uv sync --all-packages --all-extras
      # pre-commit hook (.pre-commit-config.yaml) と同じ Makefile ターゲットを呼び、
      # ローカル / CI のチェック内容がズレないようにする (Issue #15)。
      - run: make lint
      - run: make format-check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      # workspace member (digestkit) + 全 extras (pdf/web/notion/slack/email) を
      # インストールしないと、import や型解決が通らないため `--all-packages
      # --all-extras` を付与。
      - run: uv sync --all-packages --all-extras
      - run: make typecheck

  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python }}
      # workspace member (digestkit) + 全 extras (pdf/web/notion/slack/email) を
      # インストールしないと、import や型解決が通らないため `--all-packages
      # --all-extras` を付与。
      - run: uv sync --all-packages --all-extras
      - run: uv run pytest packages/digestkit/tests -m "not demonstration and not needs_network" --cov --cov-fail-under=80
