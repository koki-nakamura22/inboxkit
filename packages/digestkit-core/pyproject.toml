[project]
name = "digestkit-core"
version = "0.1.0"
description = "Core Source / Extractor protocols and concrete implementations for the digestkit ecosystem"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
authors = [{ name = "Koki NAKAMURA" }]
keywords = ["source", "extractor", "protocol", "digestkit"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
]

dependencies = []

[project.optional-dependencies]
pdf = ["pypdf>=4"]
web = ["trafilatura>=1.12", "httpx>=0.27"]
notion = ["notion-client>=2"]
all = ["digestkit-core[pdf,web,notion]"]
dev = ["pytest", "pytest-cov", "pyright", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/digestkit_core"]

[tool.pytest.ini_options]
addopts = "-ra --strict-markers --cov=digestkit_core --cov-report=term-missing"
markers = [
    "demonstration: 開発者の目視確認が必要 (実 PDF / 実 URL)",
    "needs_network: 実ネットワーク必須",
    "slow: 1 ケース ≥ 1 秒",
]
