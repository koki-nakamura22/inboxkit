[project]
name = "digestkit"
version = "0.1.0"
description = "Personal content digester framework: fetch → extract → LLM summarize → sink"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
authors = [{ name = "Koki Nakamura" }]
keywords = ["llm", "summarization", "digester", "personal-content"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Text Processing",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
]

dependencies = [
    "digestkit-core>=0.1,<0.2",
    "litellm>=1.50,<2",
    "python-dotenv>=1",
]

[project.optional-dependencies]
pdf = ["pypdf>=4"]
web = ["trafilatura>=1.12", "httpx>=0.27"]
notion = [
    "notion-client>=2",
]
slack = ["httpx>=0.27"]
email = []
all = ["digestkit[pdf,web,notion,slack,email]"]

[project.scripts]
digestkit = "digestkit.cli:main"

[project.urls]
Repository = "https://github.com/koki-nakamura22/inboxkit"
Issues = "https://github.com/koki-nakamura22/inboxkit/issues"

[tool.uv.sources]
digestkit-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/digestkit"]
