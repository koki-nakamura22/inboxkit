[project]
name = "rag-ingest"
version = "0.1.0"
description = "RAG ingestion pipeline: fetch → extract → chunk → embed → vector sink"
requires-python = ">=3.11,<3.14"

dependencies = [
    "digestkit-core>=0.1,<0.2",
    "litellm>=1.50,<2",
    "tiktoken>=0.7,<1",
    "sqlite-vec>=0.1,<0.2",
    "python-dotenv",
    "click>=8",
]

[tool.uv.sources]
digestkit-core = { workspace = true }

[project.optional-dependencies]
dev = ["pytest", "pytest-cov", "pyright", "ruff"]

[project.scripts]
rag-ingest = "rag_ingest.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_ingest"]

[tool.pytest.ini_options]
addopts = "-ra --strict-markers --cov=rag_ingest --cov-report=term-missing"
markers = [
    "demonstration: 開発者の目視確認が必要 (実 embedder / 実 PDF / 別マシン)",
    "needs_network: 実ネットワーク必須 (CI でのみ実行、ralph-loop ではスキップ)",
    "slow: 1 ケース ≥ 1 秒",
    "needs_sqlite_vec: sqlite-vec 拡張ロードが必要",
]
